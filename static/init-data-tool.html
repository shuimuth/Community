<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社区数据初始化工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .info-box {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
    }

    .info-title {
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }

    .info-text {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 20px 0;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f8f9fa;
      color: #333;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e9ecef;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: #c82333;
    }

    .log {
      background: #1e1e1e;
      color: #00ff00;
      padding: 15px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 20px;
      display: none;
    }

    .log.show {
      display: block;
    }

    .log-line {
      margin: 5px 0;
    }

    .log-error {
      color: #ff4444;
    }

    .log-success {
      color: #00ff00;
    }

    .log-info {
      color: #4da6ff;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏘️ 社区数据初始化工具</h1>
    <p class="subtitle">Community Data Initialization Tool</p>

    <div class="info-box">
      <div class="info-title">📝 使用说明</div>
      <div class="info-text">
        此工具用于快速初始化社区数据库，包含10个虚拟社区数据。<br>
        点击下方按钮即可开始初始化。
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">社区总数</div>
        <div class="stat-value" id="totalCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">活跃社区</div>
        <div class="stat-value" id="activeCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">总用户数</div>
        <div class="stat-value" id="totalUsers">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">总任务数</div>
        <div class="stat-value" id="totalTasks">-</div>
      </div>
    </div>

    <div class="button-group">
      <button class="btn-primary" id="initBtn" onclick="initCommunities()">
        🚀 初始化社区数据（10条）
      </button>
      <button class="btn-secondary" id="refreshBtn" onclick="refreshStats()">
        🔄 刷新统计
      </button>
      <button class="btn-danger" id="clearBtn" onclick="confirmClear()">
        🗑️ 清空所有数据
      </button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    // 注意：这个脚本需要在 uniCloud 环境中运行
    // 如果在独立的 HTML 文件中运行，需要先引入 uniCloud SDK

    let loading = false

    function log(message, type = 'info') {
      const logEl = document.getElementById('log')
      logEl.classList.add('show')
      const line = document.createElement('div')
      line.className = `log-line log-${type}`
      const timestamp = new Date().toLocaleTimeString()
      line.textContent = `[${timestamp}] ${message}`
      logEl.appendChild(line)
      logEl.scrollTop = logEl.scrollHeight
    }

    function setLoading(btn, isLoading) {
      if (isLoading) {
        btn.disabled = true
        const loadingSpan = document.createElement('span')
        loadingSpan.className = 'loading'
        btn.insertBefore(loadingSpan, btn.firstChild)
      } else {
        btn.disabled = false
        const loadingSpan = btn.querySelector('.loading')
        if (loadingSpan) {
          loadingSpan.remove()
        }
      }
    }

    async function initCommunities() {
      if (loading) return
      loading = true

      const btn = document.getElementById('initBtn')
      setLoading(btn, true)

      try {
        log('开始初始化社区数据...', 'info')

        // 检查 uniCloud 是否可用
        if (typeof uniCloud === 'undefined') {
          throw new Error('uniCloud 未定义，请在 uni-app 项目中运行')
        }

        const initData = uniCloud.importObject('init-data')
        const result = await initData.initCommunities()

        log(`✓ ${result.message}`, 'success')
        log(`✓ 插入了 ${result.insertedCount} 条数据`, 'success')

        await refreshStats()
      } catch (error) {
        log(`✗ 初始化失败: ${error.message}`, 'error')
        console.error('初始化失败:', error)
      } finally {
        setLoading(btn, false)
        loading = false
      }
    }

    async function refreshStats() {
      if (loading) return
      loading = true

      const btn = document.getElementById('refreshBtn')
      setLoading(btn, true)

      try {
        log('正在获取统计信息...', 'info')

        if (typeof uniCloud === 'undefined') {
          // 如果不在 uniCloud 环境，显示示例数据
          document.getElementById('totalCount').textContent = '10'
          document.getElementById('activeCount').textContent = '10'
          document.getElementById('totalUsers').textContent = '3,426'
          document.getElementById('totalTasks').textContent = '720'
          log('⚠ 演示模式：显示示例数据', 'info')
          return
        }

        const initData = uniCloud.importObject('init-data')
        const stats = await initData.getCommunitiesStats()

        document.getElementById('totalCount').textContent = stats.total
        document.getElementById('activeCount').textContent = stats.active
        document.getElementById('totalUsers').textContent = stats.totalUsers.toLocaleString()
        document.getElementById('totalTasks').textContent = stats.totalTasks.toLocaleString()

        log('✓ 统计信息已更新', 'success')
      } catch (error) {
        log(`✗ 获取统计失败: ${error.message}`, 'error')
        console.error('获取统计失败:', error)
      } finally {
        setLoading(btn, false)
        loading = false
      }
    }

    function confirmClear() {
      if (loading) return

      const confirmed = confirm('⚠️ 警告\n\n确定要清空所有社区数据吗？\n此操作不可恢复！')
      if (confirmed) {
        clearCommunities()
      }
    }

    async function clearCommunities() {
      loading = true

      const btn = document.getElementById('clearBtn')
      setLoading(btn, true)

      try {
        log('开始清空社区数据...', 'info')

        if (typeof uniCloud === 'undefined') {
          throw new Error('uniCloud 未定义，请在 uni-app 项目中运行')
        }

        const initData = uniCloud.importObject('init-data')
        const result = await initData.clearCommunities()

        log(`✓ ${result.message}`, 'success')
        log(`✓ 删除了 ${result.deletedCount} 条数据`, 'success')

        await refreshStats()
      } catch (error) {
        log(`✗ 清空失败: ${error.message}`, 'error')
        console.error('清空失败:', error)
      } finally {
        setLoading(btn, false)
        loading = false
      }
    }

    // 页面加载时刷新统计
    window.addEventListener('load', () => {
      log('🎉 工具已就绪', 'success')
      refreshStats()
    })
  </script>
</body>
</html>
